<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 15px;
      padding-bottom: 80px;
    }

    h2 {
      margin-top: 0;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 12px;
    }

    .tab {
      display: none;
    }

    .active {
      display: block;
    }

    .bottom-menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #020617;
      padding: 10px 0;
    }

    .bottom-menu button {
      background: none;
      color: white;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- HOME -->
    <div id="home" class="tab active">
      <h2>Controle Financeiro</h2>

      <input type="text" id="descricao" placeholder="Descrição">
      <input type="number" id="valor" placeholder="Valor">

      <button onclick="addGasto()">Adicionar</button>

      <div id="lista"></div>
    </div>

    <!-- METAS -->
    <div id="metas" class="tab">
      <h2>Metas</h2>

      <input type="text" id="metaNome" placeholder="Nome da meta">
      <input type="number" id="metaValor" placeholder="Valor">

      <button onclick="addMeta()">Adicionar Meta</button>

      <div id="listaMetas"></div>
    </div>

    <!-- IA -->
    <div id="ia" class="tab">
      <h2>Dicas da IA</h2>

      <div id="dicasIA">
        <p>Clique no botão para gerar dicas</p>
      </div>

      <button onclick="gerarDicas()">Gerar dicas</button>
    </div>

  </div>

  <!-- MENU -->
  <div class="bottom-menu">
    <button onclick="showTab('home')">Home</button>
    <button onclick="showTab('metas')">Metas</button>
    <button onclick="showTab('ia')">IA</button>
  </div>

  <script>
    let gastos = [];
    let metas = [];

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
    }

    function addGasto() {
      const desc = document.getElementById('descricao').value;
      const val = document.getElementById('valor').value;

      if (!desc || !val) return;

      gastos.push({ desc, val });
      renderGastos();
    }

    function renderGastos() {
      let html = '';
      gastos.forEach(g => {
        html += `<div class="card">${g.desc} - R$ ${g.val}</div>`;
      });
      document.getElementById('lista').innerHTML = html;
    }

    function addMeta() {
      const nome = document.getElementById('metaNome').value;
      const valor = document.getElementById('metaValor').value;

      if (!nome || !valor) return;

      metas.push({ nome, valor });
      renderMetas();
    }

    function renderMetas() {
      let html = '';
      metas.forEach(m => {
        html += `<div class="card">${m.nome} - R$ ${m.valor}</div>`;
      });
      document.getElementById('listaMetas').innerHTML = html;
    }

    function gerarDicas() {
      const dicas = [
        "Evite gastos desnecessários",
        "Guarde 10% do seu dinheiro",
        "Revise seus gastos semanalmente",
        "Crie metas financeiras claras"
      ];

      let html = '';
      dicas.forEach(d => {
        html += `<div class="card">${d}</div>`;
      });

      document.getElementById('dicasIA').innerHTML = html;
    }
  </script>

</body>
</html>
