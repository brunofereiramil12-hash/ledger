<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 15px;
      padding-bottom: 80px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete {
      background: red;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .tab { display: none; }
    .active { display: block; }

    .bottom-menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #020617;
      padding: 10px 0;
    }

    .bottom-menu button {
      background: none;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <div id="home" class="tab active">
    <h2>Gastos</h2>

    <input type="text" id="descricao" placeholder="Descrição">
    <input type="number" id="valor" placeholder="Valor">

    <button onclick="addGasto()">Adicionar</button>

    <div id="lista"></div>
  </div>

  <div id="metas" class="tab">
    <h2>Metas</h2>

    <input type="text" id="metaNome" placeholder="Nome">
    <input type="number" id="metaValor" placeholder="Valor">

    <button onclick="addMeta()">Adicionar</button>

    <div id="listaMetas"></div>
  </div>

  <div id="ia" class="tab">
    <h2>Dicas IA</h2>

    <div id="dicasIA"></div>

    <button onclick="gerarDicas()">Gerar</button>
  </div>

</div>

<div class="bottom-menu">
  <button onclick="showTab('home')">Home</button>
  <button onclick="showTab('metas')">Metas</button>
  <button onclick="showTab('ia')">IA</button>
</div>

<script>
  let gastos = JSON.parse(localStorage.getItem('gastos')) || [];
  let metas = JSON.parse(localStorage.getItem('metas')) || [];

  function saveData() {
    localStorage.setItem('gastos', JSON.stringify(gastos));
    localStorage.setItem('metas', JSON.stringify(metas));
  }

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
  }

  function addGasto() {
    const desc = document.getElementById('descricao').value;
    const val = document.getElementById('valor').value;

    if (!desc || !val) return;

    gastos.push({ desc, val });
    saveData();
    renderGastos();
  }

  function deleteGasto(index) {
    gastos.splice(index, 1);
    saveData();
    renderGastos();
  }

  function renderGastos() {
    let html = '';
    gastos.forEach((g, i) => {
      html += `
        <div class="card">
          ${g.desc} - R$ ${g.val}
          <button class="delete" onclick="deleteGasto(${i})">X</button>
        </div>`;
    });
    document.getElementById('lista').innerHTML = html;
  }

  function addMeta() {
    const nome = document.getElementById('metaNome').value;
    const valor = document.getElementById('metaValor').value;

    if (!nome || !valor) return;

    metas.push({ nome, valor });
    saveData();
    renderMetas();
  }

  function deleteMeta(index) {
    metas.splice(index, 1);
    saveData();
    renderMetas();
  }

  function renderMetas() {
    let html = '';
    metas.forEach((m, i) => {
      html += `
        <div class="card">
          ${m.nome} - R$ ${m.valor}
          <button class="delete" onclick="deleteMeta(${i})">X</button>
        </div>`;
    });
    document.getElementById('listaMetas').innerHTML = html;
  }

  function gerarDicas() {
    const dicas = [
      "Você está gastando muito, tente reduzir despesas",
      "Guarde pelo menos 10% da sua renda",
      "Revise seus gastos toda semana",
      "Evite compras impulsivas"
    ];

    let html = '';
    dicas.forEach(d => {
      html += `<div class="card">${d}</div>`;
    });

    document.getElementById('dicasIA').innerHTML = html;
  }

  // carregar dados ao abrir
  renderGastos();
  renderMetas();
</script>

</body>
</html>
